<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurudu 2026 - Ticket System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Sinhala:wght@400;700&family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#D4A017;--gold-light:#F5D060;--gold-dark:#A07810;
  --bg:#0D0A06;--card:#1E1810;--card2:#17120A;
  --border:rgba(212,160,23,0.25);--text:#F5EDD5;--text-dim:#A09070;
  --green:#27AE60;--red:#C0392B;--blue:#2980B9;--purple:#8E44AD;--orange:#E67E22;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(ellipse at 20% 0%,rgba(212,160,23,.08) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 100%,rgba(192,57,43,.06) 0%,transparent 50%);}
/* HEADER */
.header{text-align:center;padding:32px 20px 0}
.header::before{content:'✿';font-size:28px;display:block;color:var(--gold);animation:spin 8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.header h1{font-family:'DM Serif Display',serif;font-size:clamp(2rem,6vw,3.5rem);
  background:linear-gradient(135deg,var(--gold-light),var(--gold),var(--gold-dark));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .sinhala{font-family:'Noto Serif Sinhala',serif;font-size:clamp(.9rem,2.5vw,1.2rem);color:var(--gold-light);opacity:.8;margin-top:6px}
.header .divider{display:flex;align-items:center;gap:12px;justify-content:center;margin:16px 0;color:var(--gold);opacity:.5;font-size:20px}
.header .divider::before,.header .divider::after{content:'';flex:1;max-width:120px;height:1px;background:linear-gradient(to right,transparent,var(--gold))}
.header .divider::after{background:linear-gradient(to left,transparent,var(--gold))}
/* TABS */
.tabs{display:flex;max-width:750px;margin:20px auto 0;padding:0 20px;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:11px 8px;border:none;background:none;color:var(--text-dim);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab:hover:not(.active){color:var(--text)}
/* MAIN */
.main{max-width:750px;margin:0 auto;padding:28px 20px 60px}
/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.card-title{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--gold-light);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.card-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.card-title-row .card-title{margin-bottom:0}
/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:480px){.form-grid{grid-template-columns:1fr}}
.form-full{grid-column:1/-1}
label{display:block;font-size:12px;font-weight:500;color:var(--text-dim);margin-bottom:6px;letter-spacing:.8px;text-transform:uppercase}
input,select{width:100%;background:rgba(212,160,23,.05);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;transition:border-color .2s,background .2s;outline:none;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--gold);background:rgba(212,160,23,.1)}
select option{background:#1E1810}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0D0A06;width:100%;margin-top:18px;font-size:15px;padding:14px}
.btn-primary:not(:disabled):hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(212,160,23,.4)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-size:13px;padding:8px 16px}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-danger{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.4);color:#E74C3C;font-size:13px;padding:7px 14px}
.btn-green{background:rgba(39,174,96,.15);border:1px solid rgba(39,174,96,.4);color:#2ECC71;font-size:13px;padding:8px 16px}
.btn-green:hover{background:rgba(39,174,96,.25)}
.btn-blue{background:rgba(41,128,185,.15);border:1px solid rgba(41,128,185,.4);color:#3498DB;font-size:13px;padding:8px 16px}
.btn-blue:hover{background:rgba(41,128,185,.25)}
.btn-sm{padding:7px 14px;font-size:12px}
/* TICKET */
.ticket{background:linear-gradient(135deg,#1A1206,#231A08);border:1px solid var(--gold);border-radius:16px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.ticket-header{background:linear-gradient(135deg,var(--gold-dark),var(--gold));padding:18px 24px;display:flex;align-items:center;justify-content:space-between}
.ticket-header h2{font-family:'DM Serif Display',serif;color:#0D0A06;font-size:1.3rem}
.ticket-header .sinhala-small{font-family:'Noto Serif Sinhala',serif;font-size:.75rem;color:rgba(0,0,0,.6);margin-top:2px}
.ticket-body{padding:20px 24px;display:flex;gap:20px;align-items:flex-start}
@media(max-width:480px){.ticket-body{flex-direction:column;align-items:center}}
.ticket-info{flex:1}
.ticket-row{display:flex;flex-direction:column;margin-bottom:14px}
.ticket-label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--gold);opacity:.7}
.ticket-value{font-size:15px;font-weight:500;color:var(--text);margin-top:2px}
.ticket-id{font-family:monospace;font-size:13px;color:var(--gold-light);letter-spacing:2px;background:rgba(212,160,23,.1);padding:4px 10px;border-radius:6px;display:inline-block;margin-top:4px}
.ticket-footer{padding:12px 24px;background:rgba(0,0,0,.3);display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text-dim)}
.qr-wrap{background:white;padding:10px;border-radius:10px;flex-shrink:0}
/* BADGES */
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.status-valid{background:rgba(39,174,96,.15);color:#2ECC71;border:1px solid rgba(39,174,96,.3)}
.status-used{background:rgba(192,57,43,.15);color:#E74C3C;border:1px solid rgba(192,57,43,.3)}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
/* LIST */
.ticket-list-item{background:rgba(212,160,23,.04);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;gap:12px;transition:border-color .2s}
.ticket-list-item:hover{border-color:rgba(212,160,23,.4)}
.ticket-list-item.checked-in{opacity:.55;background:rgba(192,57,43,.04);border-color:rgba(192,57,43,.2)}
.tli-info{flex:1}
.tli-name{font-weight:600;font-size:15px}
.tli-meta{font-size:12px;color:var(--text-dim);margin-top:3px}
.tli-actions{display:flex;gap:8px;flex-wrap:wrap}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
@media(max-width:400px){.stats-grid{grid-template-columns:1fr 1fr}}
.stat-card{background:rgba(212,160,23,.05);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.stat-num{font-family:'DM Serif Display',serif;font-size:2rem;color:var(--gold-light)}
.stat-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
/* SCAN */
.scan-box{background:rgba(0,0,0,.4);border:2px dashed var(--border);border-radius:16px;padding:40px 20px;text-align:center;transition:border-color .3s}
.scan-box.active{border-color:var(--gold)}
.scan-input{max-width:320px;margin:16px auto 0}
/* RESULT */
.result-box{border-radius:14px;padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;gap:16px;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.result-success{background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.4)}
.result-error{background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.4)}
.result-icon{font-size:36px}
.result-title{font-weight:700;font-size:16px}
.result-detail{font-size:13px;color:var(--text-dim);margin-top:4px}
/* SEARCH */
.search-wrap{margin-bottom:16px;position:relative}
.search-wrap input{padding-left:40px}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:16px}
.empty{text-align:center;padding:40px;color:var(--text-dim);font-size:14px}
.empty-icon{font-size:40px;margin-bottom:10px}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;width:100%;max-width:420px;position:relative;overflow:hidden}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.login-title{font-family:'DM Serif Display',serif;font-size:1.6rem;color:var(--gold-light);text-align:center;margin-bottom:6px}
.login-sub{text-align:center;font-size:13px;color:var(--text-dim);margin-bottom:28px}
.user-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(212,160,23,.08);border:1px solid var(--border);border-radius:12px;padding:10px 16px;cursor:pointer;transition:all .2s;width:100%;margin-bottom:8px}
.user-pill:hover{border-color:rgba(212,160,23,.5)}
.user-pill.selected{background:rgba(212,160,23,.18);border-color:var(--gold)}
.user-pill-name{font-weight:600;font-size:14px;flex:1}
.role-tag{font-size:10px;background:rgba(212,160,23,.15);color:var(--gold);border-radius:4px;padding:2px 7px;letter-spacing:.5px;text-transform:uppercase}
.role-tag.checkin-tag{background:rgba(39,174,96,.12);color:#2ECC71}
.top-bar{display:flex;align-items:center;justify-content:flex-end;max-width:750px;margin:0 auto;padding:8px 20px 0;gap:10px}
.top-bar .who{font-size:13px;color:var(--text-dim)}
.top-bar .who span{color:var(--gold);font-weight:600}
.logout-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:5px 12px;color:var(--text-dim);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.logout-btn:hover{border-color:rgba(192,57,43,.6);color:#E74C3C}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;position:relative}
.modal-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:20px 20px 0 0}
.modal-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.07);border:none;color:var(--text-dim);border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:rgba(192,57,43,.3);color:#E74C3C}
.modal-title{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--gold-light);margin-bottom:20px}
.print-actions{display:flex;gap:10px;margin-top:20px}
.print-actions .btn{flex:1;margin-top:0}
/* USERS */
.user-list-item{background:rgba(212,160,23,.04);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.user-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--gold-dark),var(--gold));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.user-info{flex:1}
.user-name-row{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}
.user-desc{font-size:12px;color:var(--text-dim);margin-top:3px}
/* ── REPORT STYLES ── */
.report-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:flex-end}
.filter-bar>div{flex:1;min-width:120px}
.filter-bar label{margin-bottom:5px}
.report-table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:rgba(212,160,23,.1)}
thead th{padding:12px 14px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--gold);white-space:nowrap}
tbody tr{border-top:1px solid rgba(212,160,23,.08);transition:background .15s}
tbody tr:hover{background:rgba(212,160,23,.04)}
tbody td{padding:11px 14px;color:var(--text);font-size:13px;white-space:nowrap}
.td-used{color:#E74C3C}
.td-valid{color:#2ECC71}
/* CHART BARS */
.chart-wrap{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:12px}
.bar-label{font-size:12px;color:var(--text-dim);width:90px;flex-shrink:0;text-align:right}
.bar-track{flex:1;background:rgba(255,255,255,.05);border-radius:6px;height:22px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .6s ease;display:flex;align-items:center;padding-left:8px}
.bar-val{font-size:11px;font-weight:600;color:rgba(0,0,0,.7)}
/* DONUT */
.donut-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.donut-legend{display:flex;flex-direction:column;gap:8px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:13px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* SUMMARY ROW */
.summary-chips{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.chip{background:rgba(212,160,23,.07);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:13px;flex:1;min-width:100px;text-align:center}
.chip-num{font-family:'DM Serif Display',serif;font-size:1.5rem;display:block}
.chip-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.6px}
/* PROGRESS BAR */
.progress-wrap{margin:8px 0 16px}
.progress-track{background:rgba(255,255,255,.06);border-radius:8px;height:12px;overflow:hidden}
.progress-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--gold-dark),var(--gold));transition:width .6s ease}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text-dim);margin-top:6px}
/* CAMERA SCANNER */
.cam-wrap{position:relative;width:100%;max-width:340px;margin:0 auto;border-radius:16px;overflow:hidden;background:#000;aspect-ratio:1}
.cam-wrap video{width:100%;height:100%;object-fit:cover;display:block}
.cam-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.cam-frame{width:200px;height:200px;position:relative}
.cam-frame::before,.cam-frame::after{content:'';position:absolute;width:32px;height:32px;border-color:var(--gold);border-style:solid}
.cam-frame::before{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.cam-frame::after{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.cam-frame-tr,.cam-frame-bl{position:absolute;width:32px;height:32px;border-color:var(--gold);border-style:solid}
.cam-frame-tr{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.cam-frame-bl{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.cam-scan-line{position:absolute;left:10px;right:10px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold-light),var(--gold),transparent);animation:scanline 2s ease-in-out infinite;box-shadow:0 0 8px var(--gold)}
@keyframes scanline{0%{top:10px;opacity:1}50%{opacity:.8}100%{top:calc(100% - 12px);opacity:1}}
.cam-detected{position:absolute;inset:0;background:rgba(39,174,96,.25);display:flex;align-items:center;justify-content:center;animation:flashGreen .4s ease}
@keyframes flashGreen{from{opacity:0}to{opacity:1}}
.scan-mode-toggle{display:flex;gap:0;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px}
.scan-mode-btn{flex:1;padding:11px;border:none;background:none;color:var(--text-dim);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.scan-mode-btn.active{background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:#0D0A06;font-weight:700}
.cam-error{background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.3);border-radius:10px;padding:12px 16px;font-size:13px;color:#E74C3C;margin-top:12px;text-align:center}
/* PRINT */
@media print{
  body *{visibility:hidden !important}
  #print-area,#print-area *{visibility:visible !important}
  #print-area{position:fixed !important;inset:0 !important;display:flex !important;align-items:center !important;justify-content:center !important;background:white !important;padding:30px !important;z-index:9999 !important}
  #print-area .ticket{max-width:480px;width:100%;border:2px solid #D4A017 !important;box-shadow:none !important}
  #print-area .ticket-header{background:#D4A017 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  #print-area .ticket-header h2{color:#000 !important;-webkit-text-fill-color:#000 !important}
  #print-area .ticket-header .sinhala-small{color:rgba(0,0,0,.6) !important}
  #print-area .ticket-body{background:white !important}
  #print-area .ticket-label{color:#A07810 !important;opacity:1 !important}
  #print-area .ticket-value{color:#111 !important}
  #print-area .ticket-id{color:#A07810 !important;background:#FFF8E1 !important}
  #print-area .ticket-footer{background:#f5f5f5 !important;color:#666 !important}
  #print-area .status-valid{background:#E8F8EE !important;color:#27AE60 !important}
  #print-area .status-used{background:#FDECEA !important;color:#C0392B !important}
  #print-area .qr-wrap{border:1px solid #ddd}
  /* Report print */
  #report-print,#report-print *{visibility:visible !important}
  #report-print{position:fixed !important;inset:0 !important;background:white !important;color:#111 !important;padding:24px !important;z-index:9999 !important;overflow:auto !important;font-family:sans-serif !important}
}
</style>
</head>
<body>
<div id="root"></div>
<div id="print-area" style="display:none"></div>
<div id="report-print" style="display:none"></div>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

function genId(){
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let id='AUR-';for(let i=0;i<8;i++)id+=c[Math.floor(Math.random()*c.length)];return id;
}
const DEFAULT_USERS=[
  {id:'u1',name:'Admin',pin:'1234',role:'admin',emoji:'👑'},
  {id:'u2',name:'Checker 1',pin:'0000',role:'checkin',emoji:'🎪'},
  {id:'u3',name:'Checker 2',pin:'0000',role:'checkin',emoji:'🎭'},
];
const COLORS=['#D4A017','#27AE60','#2980B9','#8E44AD','#E67E22','#E74C3C','#1ABC9C','#F39C12'];

// ── QR ────────────────────────────────────────────────────────────────────────
function QRImg({data,size=120}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;ref.current.innerHTML='';
    try{new window.QRCode(ref.current,{text:data,width:size,height:size,colorDark:'#000',colorLight:'#fff',correctLevel:window.QRCode.CorrectLevel.M})}catch(e){}
  },[data,size]);
  return <div ref={ref}/>;
}

// ── Ticket Card ───────────────────────────────────────────────────────────────
function TicketCard({ticket,size=120}){
  const used=ticket.checkedIn;
  return(
    <div className="ticket">
      <div className="ticket-header">

// ── Print Ticket Modal ────────────────────────────────────────────────────────
function PrintModal({ticket,onClose}){
  const doPrint=()=>{
    const area=document.getElementById('print-area');
    area.style.display='flex';
    const root=ReactDOM.createRoot(area);
    root.render(<TicketCard ticket={ticket} size={140}/>);
    setTimeout(()=>{window.print();setTimeout(()=>{area.style.display='none';root.unmount();},800);},400);
  };
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box">
        <button className="modal-close" onClick={onClose}>✕</button>

          <button className="btn btn-primary" style={{background:'linear-gradient(135deg,#27AE60,#1E8449)',marginTop:0}} onClick={doPrint}>🖨️ Print Now</button>
          <button className="btn btn-outline" style={{marginTop:0}} onClick={onClose}>Close</button>
        </div>
      </div>
    </div>
  );
}

// ── Camera QR Scanner ─────────────────────────────────────────────────────────
function CameraScanner({onScan}){
  const videoRef=useRef(null);
  const canvasRef=useRef(null);
  const streamRef=useRef(null);
  const rafRef=useRef(null);
  const [camErr,setCamErr]=useState('');
  const [detected,setDetected]=useState(false);
  const lastScan=useRef('');
  const lastScanTime=useRef(0);

  const tick=useCallback(()=>{
    const video=videoRef.current;const canvas=canvasRef.current;
    if(!video||!canvas||video.readyState!==4){rafRef.current=requestAnimationFrame(tick);return;}
    const ctx=canvas.getContext('2d',{willReadFrequently:true});
    canvas.width=video.videoWidth;canvas.height=video.videoHeight;
    ctx.drawImage(video,0,0);
    try{
      const img=ctx.getImageData(0,0,canvas.width,canvas.height);
      const code=window.jsQR&&window.jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
      if(code&&code.data){
        const now=Date.now();
        // Debounce — same code within 3s ignore
        if(code.data!==lastScan.current||now-lastScanTime.current>3000){
          lastScan.current=code.data;lastScanTime.current=now;
          setDetected(true);
          setTimeout(()=>setDetected(false),600);
          onScan(code.data);
        }
      }
    }catch(e){}
    rafRef.current=requestAnimationFrame(tick);
  },[onScan]);

  useEffect(()=>{
    let mounted=true;
    const start=async()=>{
      try{
        // Prefer back camera on mobile
        const stream=await navigator.mediaDevices.getUserMedia({
          video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}
        });
        if(!mounted){stream.getTracks().forEach(t=>t.stop());return;}
        streamRef.current=stream;
        if(videoRef.current){videoRef.current.srcObject=stream;await videoRef.current.play();}
        rafRef.current=requestAnimationFrame(tick);
      }catch(e){
        if(!mounted)return;
        if(e.name==='NotAllowedError')setCamErr('Camera permission denied. Please allow camera access and try again.');
        else if(e.name==='NotFoundError')setCamErr('No camera found on this device.');
        else setCamErr('Camera start කරන්න බැරි වුණා: '+e.message);
      }
    };
    start();
    return()=>{
      mounted=false;
      cancelAnimationFrame(rafRef.current);
      streamRef.current?.getTracks().forEach(t=>t.stop());
    };
  },[tick]);

  if(camErr) return(
    <div>
      <div className="cam-error">📵 {camErr}</div>
      <div style={{fontSize:12,color:'var(--text-dim)',textAlign:'center',marginTop:10}}>
        💡 HTTPS හෝ localhost ෙකෙ open කළාම camera work කරනවා. Safari/Chrome use කරන්න.
      </div>
    </div>
  );

  return(
    <div>
      <div className="cam-wrap">
        <video ref={videoRef} playsInline muted style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
        <canvas ref={canvasRef} style={{display:'none'}}/>
        <div className="cam-overlay">
          <div className="cam-frame">
            <div className="cam-frame-tr"/>
            <div className="cam-frame-bl"/>
            <div className="cam-scan-line"/>
          </div>
        </div>
        {detected&&<div className="cam-detected"><span style={{fontSize:48}}>✅</span></div>}
      </div>
      <div style={{textAlign:'center',fontSize:12,color:'var(--text-dim)',marginTop:10}}>
        QR code eka frame eke ඇතුළේ තියන්න • Auto detect වෙනවා
      </div>
    </div>
  );
}

// ── Check-in Tab ──────────────────────────────────────────────────────────────
function CheckinTab({tickets,setTickets}){
  const [q,setQ]=useState('');
  const [res,setRes]=useState(null);
  const [resKey,setResKey]=useState(0);
  const [mode,setMode]=useState('camera'); // 'camera' | 'manual'
  const inp=useRef(null);

  useEffect(()=>{if(mode==='manual')setTimeout(()=>inp.current?.focus(),100);},[mode]);

  const go=useCallback((id)=>{
    const clean=id.trim().toUpperCase();if(!clean)return;
    const t=tickets.find(x=>x.id===clean);
    if(!t){setRes({ok:false,msg:'Ticket Not Found',det:`"${clean}" system eke naha`});}
    else if(t.checkedIn){setRes({ok:false,msg:'Already Checked In! ⚠️',det:`${t.name} — ${t.checkedInAt}`});}
    else{
      const now=new Date().toLocaleString();
      setTickets(p=>p.map(x=>x.id===clean?{...x,checkedIn:true,checkedInAt:now}:x));
      setRes({ok:true,msg:`Welcome, ${t.name}! ✨`,det:`${t.type} • ${t.zone}`});
    }
    setResKey(k=>k+1);setQ('');
  },[tickets,setTickets]);

  const cc=tickets.filter(t=>t.checkedIn).length;

  return(
    <div>
      <div className="stats-grid" style={{gridTemplateColumns:'1fr 1fr'}}>
        <div className="stat-card"><div className="stat-num" style={{color:'#2ECC71'}}>{cc}</div><div className="stat-label">Checked In</div></div>
        <div className="stat-card"><div className="stat-num" style={{color:'#F39C12'}}>{tickets.length-cc}</div><div className="stat-label">Remaining</div></div>
      </div>

      {/* Result */}
      {res&&(
        <div key={resKey} className={`result-box ${res.ok?'result-success':'result-error'}`}>
          <div className="result-icon">{res.ok?'✅':'❌'}</div>
          <div><div className="result-title">{res.msg}</div><div className="result-detail">{res.det}</div></div>
        </div>
      )}

      <div className="card">
        {/* Mode Toggle */}
        <div className="scan-mode-toggle">
          <button className={`scan-mode-btn ${mode==='camera'?'active':''}`} onClick={()=>setMode('camera')}>
            📷 Camera Scan
          </button>
          <button className={`scan-mode-btn ${mode==='manual'?'active':''}`} onClick={()=>setMode('manual')}>
            ⌨️ Manual / Scanner
          </button>
        </div>

        {/* Camera Mode */}
        {mode==='camera'&&(
          <div>
            <CameraScanner onScan={go}/>
          </div>
        )}

        {/* Manual Mode */}
        {mode==='manual'&&(
          <div className={`scan-box ${q?'active':''}`} style={{marginTop:0,border:'none',padding:'10px 0 0'}}>
            <div style={{fontSize:40,marginBottom:8}}>⌨️</div>
            <div style={{color:'var(--text-dim)',fontSize:14}}>Ticket ID type කරන්න හෝ USB/Bluetooth scanner use කරන්න</div>
            <div className="scan-input">
              <input ref={inp} value={q}
                onChange={e=>setQ(e.target.value.toUpperCase())}
                onKeyDown={e=>e.key==='Enter'&&go(q)}
                placeholder="AUR-XXXXXXXX"
                style={{textAlign:'center',letterSpacing:'3px',fontFamily:'monospace',fontSize:16}}/>
            </div>
            <button className="btn btn-primary" style={{maxWidth:200,margin:'14px auto 0'}} onClick={()=>go(q)}>✓ Check In</button>
          </div>
        )}
      </div>

      {/* Recent */}
      <div className="card">
        <div className="card-title">📋 Recent Check-ins</div>
        {tickets.filter(t=>t.checkedIn).length===0
          ?<div className="empty"><div className="empty-icon">🚪</div>No check-ins yet</div>
          :tickets.filter(t=>t.checkedIn).slice(0,15).map(t=>(
            <div key={t.id} className="ticket-list-item checked-in">
              <div className="tli-info"><div className="tli-name">{t.name}</div><div className="tli-meta">{t.id} • {t.type} • {t.checkedInAt}</div></div>

            </div>
          ))
        }
      </div>
    </div>
  );

// ── Simple Donut SVG ──────────────────────────────────────────────────────────
function DonutChart({segments,size=120}){
  const r=45,cx=60,cy=60,circ=2*Math.PI*r;
  const total=segments.reduce((a,s)=>a+s.value,0)||1;
  let offset=0;
  return(
    <div className="donut-wrap">
      <svg width={size} height={size} viewBox="0 0 120 120">
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,.05)" strokeWidth="18"/>
        {segments.map((s,i)=>{
          const dash=(s.value/total)*circ;const gap=circ-dash;
          const el=<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth="18" strokeDasharray={`${dash} ${gap}`} strokeDashoffset={-offset} style={{transition:'stroke-dasharray .6s ease',transform:'rotate(-90deg)',transformOrigin:'50% 50%'}}/>;
          offset+=dash;return el;
        })}
        <text x={cx} y={cy-6} textAnchor="middle" fill="var(--gold-light)" fontSize="18" fontFamily="DM Serif Display,serif" fontWeight="700">{total}</text>
        <text x={cx} y={cy+10} textAnchor="middle" fill="var(--text-dim)" fontSize="9">Total</text>
      </svg>
      <div className="donut-legend">
        {segments.map((s,i)=>(
          <div key={i} className="legend-item">
            <div className="legend-dot" style={{background:s.color}}/>
            <span>{s.label}</span>
            <span style={{marginLeft:'auto',fontWeight:600,paddingLeft:12}}>{s.value} <span style={{color:'var(--text-dim)',fontWeight:400,fontSize:11}}>({Math.round((s.value/total)*100)}%)</span></span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Report Tab ────────────────────────────────────────────────────────────────
function ReportTab({tickets}){
  const [filterType,setFilterType]=useState('all');
  const [filterZone,setFilterZone]=useState('all');
  const [filterStatus,setFilterStatus]=useState('all');
  const [filterDate,setFilterDate]=useState('');
  const [search,setSearch]=useState('');
  const [sortBy,setSortBy]=useState('issuedAt');
  const [sortDir,setSortDir]=useState('desc');

  // Derived data
  const types=[...new Set(tickets.map(t=>t.type))];
  const zones=[...new Set(tickets.map(t=>t.zone))];
  const dates=[...new Set(tickets.map(t=>t.date))].sort();

  const filtered=useMemo(()=>{
    let r=[...tickets];
    if(filterType!=='all')r=r.filter(t=>t.type===filterType);
    if(filterZone!=='all')r=r.filter(t=>t.zone===filterZone);
    if(filterStatus!=='all')r=r.filter(t=>filterStatus==='checked'?t.checkedIn:!t.checkedIn);
    if(filterDate)r=r.filter(t=>t.date===filterDate);
    if(search)r=r.filter(t=>t.name.toLowerCase().includes(search.toLowerCase())||t.id.includes(search.toUpperCase())||t.phone?.includes(search));
    r.sort((a,b)=>{
      let av=a[sortBy]||'',bv=b[sortBy]||'';
      if(typeof av==='boolean')av=av?1:0,bv=bv?1:0;
      if(av<bv)return sortDir==='asc'?-1:1;if(av>bv)return sortDir==='asc'?1:-1;return 0;
    });
    return r;
  },[tickets,filterType,filterZone,filterStatus,filterDate,search,sortBy,sortDir]);

  const total=tickets.length,checked=tickets.filter(t=>t.checkedIn).length;
  const pct=total?Math.round((checked/total)*100):0;

  // Chart data
  const byType=types.map((tp,i)=>({label:tp,value:tickets.filter(t=>t.type===tp).length,color:COLORS[i%COLORS.length]}));
  const byZone=zones.map((z,i)=>({label:z,value:tickets.filter(t=>t.zone===z).length,color:COLORS[(i+3)%COLORS.length]}));
  const byTypeChecked=types.map((tp,i)=>({label:tp,value:tickets.filter(t=>t.type===tp&&t.checkedIn).length,color:COLORS[i%COLORS.length]}));

  // Export CSV
  const exportCSV=()=>{
    const hdr=['Ticket ID','Name','Phone','Type','Zone','Date','Time','Status','Issued At','Checked In At'];
    const rows=filtered.map(t=>[t.id,t.name,t.phone||'',t.type,t.zone,t.date,t.time,t.checkedIn?'Checked In':'Pending',t.issuedAt||'',t.checkedInAt||'']);
    const csv=[hdr,...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
    const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
    a.download=`aurudu2026_report_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  };

  // Print Report
  const printReport=()=>{
    const area=document.getElementById('report-print');
    const now=new Date().toLocaleString();
    const rows=filtered.map(t=>`<tr style="border-top:1px solid #eee"><td style="padding:7px 10px">${t.id}</td><td style="padding:7px 10px">${t.name}</td><td style="padding:7px 10px">${t.phone||'-'}</td><td style="padding:7px 10px">${t.type}</td><td style="padding:7px 10px">${t.zone}</td><td style="padding:7px 10px">${t.date}</td><td style="padding:7px 10px;color:${t.checkedIn?'#27AE60':'#E67E22'};font-weight:600">${t.checkedIn?'✅ Checked In':'⏳ Pending'}</td></tr>`).join('');
    area.innerHTML=`
      <div style="max-width:900px;margin:0 auto">
        <div style="text-align:center;margin-bottom:24px;border-bottom:2px solid #D4A017;padding-bottom:16px">
          <h1 style="font-size:24px;color:#A07810;font-family:serif">🎊 Aurudu Festival 2026</h1>
          <h2 style="font-size:16px;color:#555;font-weight:normal;margin-top:4px">Ticket Report — Generated: ${now}</h2>
        </div>
        <div style="display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap">
          <div style="background:#FFF8E1;border:1px solid #D4A017;border-radius:8px;padding:12px 20px;text-align:center;flex:1">
            <div style="font-size:28px;font-weight:700;color:#A07810">${total}</div><div style="font-size:11px;color:#888;text-transform:uppercase">Total Issued</div>
          </div>
          <div style="background:#E8F8EE;border:1px solid #27AE60;border-radius:8px;padding:12px 20px;text-align:center;flex:1">
            <div style="font-size:28px;font-weight:700;color:#27AE60">${checked}</div><div style="font-size:11px;color:#888;text-transform:uppercase">Checked In</div>
          </div>
          <div style="background:#FEF9EC;border:1px solid #E67E22;border-radius:8px;padding:12px 20px;text-align:center;flex:1">
            <div style="font-size:28px;font-weight:700;color:#E67E22">${total-checked}</div><div style="font-size:11px;color:#888;text-transform:uppercase">Pending</div>
          </div>
          <div style="background:#EAF4FB;border:1px solid #2980B9;border-radius:8px;padding:12px 20px;text-align:center;flex:1">
            <div style="font-size:28px;font-weight:700;color:#2980B9">${pct}%</div><div style="font-size:11px;color:#888;text-transform:uppercase">Attendance</div>
          </div>
        </div>
        <p style="font-size:12px;color:#888;margin-bottom:10px">Showing ${filtered.length} of ${total} tickets ${filterType!=='all'?`• Type: ${filterType}`:''}${filterZone!=='all'?` • Zone: ${filterZone}`:''}${filterStatus!=='all'?` • Status: ${filterStatus}`:''}${filterDate?` • Date: ${filterDate}`:''}</p>
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead><tr style="background:#FFF8E1">
            <th style="padding:10px;text-align:left;color:#A07810;border-bottom:2px solid #D4A017">Ticket ID</th>
            <th style="padding:10px;text-align:left;color:#A07810;border-bottom:2px solid #D4A017">Name</th>
            <th style="padding:10px;text-align:left;color:#A07810;border-bottom:2px solid #D4A017">Phone</th>
            <th style="padding:10px;text-align:left;color:#A07810;border-bottom:2px solid #D4A017">Type</th>
            <th style="padding:10px;text-align:left;color:#A07810;border-bottom:2px solid #D4A017">Zone</th>
            <th style="padding:10px;text-align:left;color:#A07810;border-bottom:2px solid #D4A017">Date</th>
            <th style="padding:10px;text-align:left;color:#A07810;border-bottom:2px solid #D4A017">Status</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <p style="text-align:center;font-size:11px;color:#aaa;margin-top:20px">Aurudu 2026 Ticket Management System</p>
      </div>`;
    area.style.display='block';
    setTimeout(()=>{window.print();setTimeout(()=>{area.style.display='none';area.innerHTML='';},1000);},400);
  };

  const sort=(col)=>{if(sortBy===col)setSortDir(d=>d==='asc'?'desc':'asc');else{setSortBy(col);setSortDir('asc');}};
  const arrow=(col)=>sortBy===col?(sortDir==='asc'?'↑':'↓'):'↕';

  if(tickets.length===0) return(
    <div className="card"><div className="empty"><div className="empty-icon">📊</div>Tickets issue කළාට පස්සේ report eka generate කරන්න පුළුවන්</div></div>
  );

  return(
    <div>
      {/* Summary chips */}
      <div className="summary-chips">
        <div className="chip"><span className="chip-num">{total}</span><span className="chip-label">Total Issued</span></div>
        <div className="chip" style={{borderColor:'rgba(39,174,96,.35)'}}><span className="chip-num" style={{color:'#2ECC71'}}>{checked}</span><span className="chip-label">Checked In</span></div>
        <div className="chip" style={{borderColor:'rgba(230,126,34,.35)'}}><span className="chip-num" style={{color:'#E67E22'}}>{total-checked}</span><span className="chip-label">Pending</span></div>
        <div className="chip" style={{borderColor:'rgba(41,128,185,.35)'}}><span className="chip-num" style={{color:'#3498DB'}}>{pct}%</span><span className="chip-label">Attendance</span></div>
      </div>

      {/* Attendance progress */}
      <div className="card">
        <div className="card-title">📈 Attendance Progress</div>
        <div className="progress-wrap">
          <div className="progress-track"><div className="progress-fill" style={{width:`${pct}%`}}/></div>
          <div className="progress-label"><span>{checked} checked in</span><span>{pct}% attendance</span><span>{total-checked} remaining</span></div>
        </div>
      </div>

      {/* Charts row */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
        <div className="card" style={{marginBottom:0}}>
          <div className="card-title">🎟️ By Type</div>
          <DonutChart segments={byType} size={130}/>
        </div>
        <div className="card" style={{marginBottom:0}}>
          <div className="card-title">📍 By Zone</div>
          <BarChart data={byZone} color={COLORS}/>
        </div>
      </div>

      {/* Check-in by type */}
      <div className="card">
        <div className="card-title">✅ Check-ins by Type</div>
        <BarChart data={byTypeChecked.map((d,i)=>({...d,label:d.label,value:d.value}))} color={['#27AE60','#2ECC71','#1ABC9C','#16A085','#27AE60']}/>
      </div>

      {/* Filters + table */}
      <div className="card">
        <div className="card-title-row">
          <div className="card-title">📋 Ticket Details</div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-green btn-sm" onClick={exportCSV}>⬇️ CSV</button>
            <button className="btn btn-blue btn-sm" onClick={printReport}>🖨️ Print</button>
          </div>
        </div>

        {/* Filter bar */}
        <div className="filter-bar">
          <div>
            <label>Type</label>
            <select value={filterType} onChange={e=>setFilterType(e.target.value)}>
              <option value="all">All Types</option>
              {types.map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
          <div>
            <label>Zone</label>
            <select value={filterZone} onChange={e=>setFilterZone(e.target.value)}>
              <option value="all">All Zones</option>
              {zones.map(z=><option key={z}>{z}</option>)}
            </select>
          </div>
          <div>
            <label>Status</label>
            <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
              <option value="all">All</option>
              <option value="checked">Checked In</option>
              <option value="pending">Pending</option>
            </select>
          </div>
          <div>
            <label>Date</label>
            <select value={filterDate} onChange={e=>setFilterDate(e.target.value)}>
              <option value="">All Dates</option>
              {dates.map(d=><option key={d}>{d}</option>)}
            </select>
          </div>
        </div>

        {/* Search */}
        <div className="search-wrap" style={{marginBottom:12}}>
          <span className="search-icon">🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name, ticket ID, phone..."/>
        </div>

        {/* Result count */}
        <div style={{fontSize:12,color:'var(--text-dim)',marginBottom:10}}>
          Showing <strong style={{color:'var(--gold)'}}>{filtered.length}</strong> of {total} tickets
          {(filterType!=='all'||filterZone!=='all'||filterStatus!=='all'||filterDate||search)&&
            <button onClick={()=>{setFilterType('all');setFilterZone('all');setFilterStatus('all');setFilterDate('');setSearch('');}} style={{marginLeft:10,background:'none',border:'none',color:'#E74C3C',fontSize:12,cursor:'pointer',textDecoration:'underline'}}>Clear filters</button>}
        </div>

        {/* Table */}
        {filtered.length===0?<div className="empty"><div className="empty-icon">🔍</div>No tickets match filters</div>:(
          <div className="report-table-wrap">
            <table>
              <thead>
                <tr>
                  {[['id','Ticket ID'],['name','Name'],['type','Type'],['zone','Zone'],['date','Date'],['checkedIn','Status']].map(([col,lbl])=>(
                    <th key={col} onClick={()=>sort(col)} style={{cursor:'pointer',userSelect:'none'}}>{lbl} <span style={{opacity:.5}}>{arrow(col)}</span></th>
                  ))}
                  <th>Issued At</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(t=>(
                  <tr key={t.id}>
                    <td><span style={{fontFamily:'monospace',fontSize:12,color:'var(--gold-light)',letterSpacing:1}}>{t.id}</span></td>
                    <td><strong>{t.name}</strong>{t.phone&&<div style={{fontSize:11,color:'var(--text-dim)'}}>{t.phone}</div>}</td>
                    <td>{t.type}</td>
                    <td>{t.zone}</td>
                    <td>{t.date}</td>
                    <td>{t.checkedIn
                      ?<span className="td-used">✅ {t.checkedInAt?.split(',')[1]?.trim()||'Done'}</span>
                      :<span className="td-valid">⏳ Pending</span>}
                    </td>
                    <td style={{color:'var(--text-dim)',fontSize:12}}>{t.issuedAt}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);const [tab,setTab]=useState('checkin');
  const [tickets,setTickets]=useState(()=>{try{return JSON.parse(localStorage.getItem('aud26_t')||'[]')}catch{return []}});
  const [users,setUsers]=useState(()=>{try{return JSON.parse(localStorage.getItem('aud26_u')||'null')||DEFAULT_USERS}catch{return DEFAULT_USERS}});
  useEffect(()=>{try{localStorage.setItem('aud26_t',JSON.stringify(tickets))}catch{}},[tickets]);
  useEffect(()=>{try{localStorage.setItem('aud26_u',JSON.stringify(users))}catch{}},[users]);

  if(!user)return <LoginScreen users={users} onLogin={u=>{setUser(u);setTab(u.role==='admin'?'admin':'checkin');}}/>;
  const isAdmin=user.role==='admin';

  return(
    <div>
      <div className="header">
        <h1>Aurudu 2026</h1>
        <div className="sinhala">ටිකට් කළමනාකරණ පද්ධතිය</div>
        <div className="divider">✦</div>
      </div>
      <div className="top-bar">
        <div className="who">{user.emoji} <span>{user.name}</span> logged in</div>
        <button className="logout-btn" onClick={()=>setUser(null)}>Logout</button>
      </div>
      <div className="tabs" style={{marginTop:10}}>
        {isAdmin&&<button className={`tab ${tab==='admin'?'active':''}`} onClick={()=>setTab('admin')}>🎟 Issue</button>}
        <button className={`tab ${tab==='checkin'?'active':''}`} onClick={()=>setTab('checkin')}>✅ Check-In</button>
        {isAdmin&&<button className={`tab ${tab==='report'?'active':''}`} onClick={()=>setTab('report')}>📊 Report</button>}
        {isAdmin&&<button className={`tab ${tab==='users'?'active':''}`} onClick={()=>setTab('users')}>👥 Users</button>}
      </div>
      <div className="main">
        {tab==='admin'&&isAdmin&&<AdminTab tickets={tickets} setTickets={setTickets}/>}
        {tab==='checkin'&&<CheckinTab tickets={tickets} setTickets={setTickets}/>}
        {tab==='report'&&isAdmin&&<ReportTab tickets={tickets}/>}
        {tab==='users'&&isAdmin&&<UsersTab users={users} setUsers={setUsers}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
